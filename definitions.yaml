page_title: Up-Goer Five for NCAS

page_subtitle: |
  National Centre for Atmospheric Science using
  only the thousand most common words

page_summary: |
  The world of NCAS explained under the Up-Goer Five Challenge:
  using only the thousand most common words. Inspired by the original Up-Goer
  Five idea, a session at NCAS Staff Meeting 2026 explored how we describe
  our work, science, and shared purpose using simple language. The cards
  here collect definitions for words and phrases relating to NCAS decided
  by members of NCAS in the session. In some case there are multiple
  definitions, reflecting the many ways we can explain the same concept.
  See the links below for further context.

  For more information and context, see the resources linked in the
  buttons below.

