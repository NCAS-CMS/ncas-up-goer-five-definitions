title: Up-Goer-Five Session, NCAS Related Terms Definitions

definitions:
  - term: Weather
    variant: 1
    definition: >
      when the air is hot or wet and moving and changes every day

  - term: Weather
    variant: 2
    definition: >
      what's happening above your head with air, rain, sun and so on

  - term: Weather
    variant: 3
    definition: >
      something that happens all the time and it's outside

  - term: Weather
    variant: 4
    definition: >
      stuff happening in the sky that causes wind, rain, snow and storms

  - term: Cloud
    variant: 1
    definition: >
      big and white soft thing in the sky

  - term: Cloud
    variant: 2
    definition: >
      a body of water in the sky that hangs around until its ready to rain or snow

  - term: Cloudy
    variant: 1
    definition: >
      when the sky tries on soft silver roads to make you feel how close and far it could be to you

  - term: CMS
    variant: 1
    definition: >
      help make computer work fast

  - term: CMS
    variant: 2
    definition: >
      computer small world help

  - term: NCAS
    variant: 1
    definition: >
      land-wide sky air doctors

  - term: NCAS
    variant: 2
    definition: >
      We are the team of people working to understand the air to help make life
      better and find ways to save us. We like coffee beer food and clouds in
      no order. We are the team of people working to help make the air great
      again (air thinking people).

  - term: Research Scientist
    variant: 1
    definition: >
      I understand how the air around us changes and creates rain. I try to
      understand how big bodies of air half the size of the world cause changes
      in small bodies of air that cause rain called storms.

  - term: Automation
    variant: 1
    definition: >
      telling a computer to do stuff to things, on its own

  - term: Dispersion
    variant: 1
    definition: >
      bad air moving and seeing where it goes and how it spreads out

  - term: Climate Simulation
    variant: 1
    definition: >
      finding a way to talk about how different parts of the world work using a
      computer's brain

  - term: Uncrewed Aerial System (UAS)
    variant: 1
    definition: >
      small flying box that looks at things in the sky

  - term: Environmental Sustainability
    variant: 1
    definition: >
      Stop making the world change in a bad way. Use less power. Use less water.
      Think about how you use things and use things more than once. Make things
      in a clean way and use them carefully. Throw away less.

  - term: Modelling
    variant: 1
    definition: >
      runs on a big computer and takes a large information set to say high
      change of what will happen

  - term: Data
    variant: 1
    definition: >
      large information set

  - term: Observation
    variant: 1
    definition: >
      getting information from looking

  - term: Jasmin
    variant: 1
    definition: >
      it is a big computer system that we use to figure out how the air, wind,
      snow and storms change in the past and in the future

  - term: SCR
    variant: 1
    definition: >
      it is a place where our team goes every week on day five of the week to
      laugh, talk, drink and have fiid

  - term: Supervising
    variant: 1
    definition: >
      telling other people at work what to do. Help people with their questions

  - term: Ocean
    variant: 1
    definition: >
      the biggest body of water, with hot and cold waters moving up and down,
      left and right, changing how much heat is changing from please to place
      around the world

  - term: Slack
    variant: 1
    definition: >
      a computer system where people can talk and write to each other, creating
      groups and shating things at real time

  - term: Climate
    variant: 1
    definition: >
      we study how storms, rain, heat waves, and other things will change as we
      put more bad things in the air

  - term: Cake Club
    variant: 1
    definition: >
      a group of people who work together and enjoy bringing sweet things
      together in one place, warm them to create something very good to eat and
      share them

  - term: Coffee
    variant: 1
    definition: >
      a black and warm drink that makes us not fall asleep and talk together and
      talk together next to the machine we use to prepare it (without using the
      pointy cutting thing)

  - term: Research Software Engineer
    variant: 1
    definition: >
      person that knows how to fix things and make things work and put and take
      things from clouds and is poor but happy

  - term: NCAS Tagline
    variant: 1
    subtitle: Leading atmospheric science for a sustainable future
    definition: >
      allowing, helping and leading the discovering of facts about the parts of
      the air now and for the many years to come to guard people and living
      parts of the earth

  - term: Air pollution
    variant: 1
    definition: >
      dirt in the air from cars, ships, trucks and fires that hurts people and
      changes clouds

  - term: High Performance Computing (HPC)
    variant: 1
    definition: >
      big computers in your building or far away that we use to understand how
      the sky works

  - term: AMOF
    variant: 1
    definition: >
      group of people who look at the sky to see what is happening and how it
      happens

  - term: Monsoon
    variant: 1
    definition: >
      a set of winds that changes direction between winter and summer, bringing
      most of a country’s rain
